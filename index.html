<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
     <!--Stop Google:-->
    <META NAME="robots" CONTENT="noindex,nofollow">
     <link href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/9wAA7usAAFVRAAC7uwAA//cAAPrfAAD63wAA+t8AAPjfAAD7jwAA+98AAPvfAAD71wAA++8AAP//AAD//wAA" rel="icon" type="image/x-icon">
     
   <title>Quantum Analyzer</title>    
<script src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>

</head>
<body>

<div id="control-panel">
  <!-- Main Title Heading -->
  <h1 class="panel-heading">Quantum Analyzer</h1>

  <!-- Target container box anchor for the p5js canvas mount element -->
  <div id="p5-canvas-container"></div>

  <!-- Panel 1: Instrument Parameters -->
  <fieldset class="compact-panel">
    <legend>Instrument Parameters</legend>
    
    <!-- Top 4 elements split into a clean 2x2 grid row -->
    <div class="top-grid">
      <label>
        <span>vector network analyzer source power:</span>
        <input type="text" name="vna_source_power" value="-30">
        <span class="unit">dBm</span>
      </label>
    
      <label>
        <span>vector network analyzer IF bandwidth:</span>
        <input type="text" name="vna_if_bandwidth" value="10000">
        <span class="unit">Hz</span>
      </label>
    
      <label>
        <span>spectrum analyzer resolution bandwidth:</span>
        <input type="text" name="sa_resolution_bandwidth" value="1.0">
        <span class="unit">MHz</span>
      </label>
    
      <label>
        <span>spectrum analyzer video bandwidth:</span>
        <input type="text" name="sa_video_bandwidth" value="10.0">
        <span class="unit">kHz</span>
      </label>
    </div>

    <!-- Middle 3 elements split into 3 columns side-by-side -->
    <div class="inline-row">
      <label>
        <span>start frequency:</span>
        <input type="text" name="start_frequency" value="4.0">
        <span class="unit">GHz</span>
      </label>

      <label>
        <span>stop frequency:</span>
        <input type="text" name="stop_frequency" value="8.0">
        <span class="unit">GHz</span>
      </label>

      <label>
        <span>number of points:</span>
        <input type="text" name="number_of_points" value="1001">
        <span class="unit"></span> 
      </label>
    </div>
  </fieldset>

  <!-- Lower Container Panels Wrapper -->
  <div class="control-panel twin-columns">

    <!-- 1. Room Temperature Switch Matrix -->
    <fieldset class="compact-panel lower-matrix">
      <legend>Room Temperature Switch Matrix</legend>
    
      <label>
        <span>Measurement Instrument Select:</span>
        <select name="output_mode">
          <option value="spectrum_analyzer">Spectrum Analyzer</option>
          <option value="vector_network_analyzer">Vector Network Analyzer</option>
        </select>
      </label>

      <label>
        <span>s matrix element select:</span>
        <select name="s_parameter_select">
          <option value="s11">s11 (input reflection)</option>
          <option value="s21">s21 (forward gain)</option>
          <option value="s12">s12 (reverse gain)</option>
          <option value="s22">s22 (output reflection)</option>
          <option value="s24">s24 (1 port into forward)</option>
          <option value="s14">s14 (1 port into reverse)</option>
          <option value="s13">s13 (output 1 test)</option>
          <option value="s23">s23 (output 2 test)</option>
        </select>
      </label>

      <label class="full-width-field">
        <span>programmable attenuator:</span>
        <input type="text" name="programmable_attenuator" value="-40">
        <span class="unit">dB</span>
      </label>
    </fieldset>
    
    <!-- 2. Cryogenic Switch Matrix -->
    <fieldset class="compact-panel lower-matrix">
      <legend>Cryogenic Switch Matrix</legend>
    
      <label>
        <span>Cryogenic Output Switch 1:</span>
        <select name="cryogenic_output_switch_1">
          <option value="output">output</option>
          <option value="sntj">sntj</option>
          <option value="jpa">jpa</option>
          <option value="short">short</option>
          <option value="open">open</option>
          <option value="load">load</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
      <label>
        <span>2 Port Device Cryogenic Switch Pair:</span>
        <select name="cryogenic_dut_switch_pair">
          <option value="thru">thru</option>
          <option value="reflect">reflect</option>
          <option value="line">line</option>
          <option value="qubit">qubit</option>
          <option value="twpa">twpa</option>
          <option value="coupler">coupler</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
      <label>
        <span>Cryogenic Output Switch 2:</span>
        <select name="cryogenic_output_switch_2">
          <option value="output">output</option>
          <option value="sntj">sntj</option>
          <option value="jpa">jpa</option>
          <option value="short">short</option>
          <option value="open">open</option>
          <option value="load">load</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
    </fieldset>    

  </div>
</div>    

<style>
/* 1. Container Shape Settings */
#control-panel {
  position: absolute;
  left: 10px;
  top: 10px;
  bottom: 10px;
  width: calc(48% - 20px); 
  overflow-y: auto;
  overflow-x: hidden; 
  padding-right: 10px; 
}

/* Panel Heading Typography Styling */
.panel-heading {
  font-family: Arial, sans-serif;
  font-size: 24px;
  color: #000000;
  margin-top: 0;
  margin-bottom: 16px;
  text-align: left;
}

/* p5js Canvas Holder Frame Styling (Automatically expands matching your layouts width) */
#p5-canvas-container {
  width: 100%;
  height: 250px; /* CHANGED from min-height: 200px to give it an explicit height */
  background-color: #ffffff;
  border: 2px solid #000000;
  margin-bottom: 20px;
}

/* 2. Global Setup Layout & Box Model Resets */
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.control-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 20px;
}

/* 3. Global Panel Containers */
fieldset.compact-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 16px;
  border: 2px solid #000000;
  background-color: #ffffff;
  width: 100%; 
}

legend {
  font-weight: bold;
  padding: 0 6px;
}

/* 4. Global Control Fields Default Elements Typography */
fieldset.compact-panel input,
fieldset.compact-panel select {
  font-family: monospace;
  font-size: 14px;
  padding: 6px 8px;
  border: 2px solid #000000;
  background-color: #ffffff;
  width: 100%;
}

/* 5. Top Grid Area Layout Rules (2x2 Structure) */
.top-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.top-grid label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}

.top-grid .unit {
  position: absolute;
  right: 10px;
  bottom: 8px;
  font-size: 14px;
  color: #666;
}

/* 6. Middle Inline Frequency Rows Layout Rules (1x3 Structure) */
.inline-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

.inline-row label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}

.inline-row .unit {
  position: absolute;
  right: 10px;
  bottom: 8px;
  font-size: 14px;
  color: #666;
}

/* 7. Attenuator Layout Rules */
.full-width-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  width: 100%;
}

.full-width-field .unit {
  position: absolute;
  right: 10px;
  bottom: 8px;
  font-size: 14px;
  color: #666;
}

/* 8. Lower Section Matrices Layout Style */
.lower-matrix label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

/* 9. Twin Column Side-by-Side Override Structure */
.control-panel.twin-columns {
  flex-direction: row !important;
  width: 100%; 
  align-items: stretch; 
}

.control-panel.twin-columns .compact-panel {
  flex: 1;
  width: 100%;
}
</style>
<script>
function setup() {

 let container = document.getElementById('p5-canvas-container');
    
    // Read its precise pixels directly from your CSS layout configurations
    let w = container.clientWidth;
    let h = container.clientHeight;
    
    // Initialize the canvas to those exact values
    let canvas = createCanvas(w, h);
    canvas.parent('p5-canvas-container');

    unit =  Math.min(innerWidth, innerHeight)/9;
    x0 = width/2;
    y0 = height/2;
    thetaX = 0;// 2*arcsin(g_x/9.8), map [-pi/2,pi/2] to [0,width]
    thetaY = 0;// 2*arcsin(g_y/9.8), map [-pi/2,pi/2] to [height,0]
    thetaZ = 0;// 4*arccos(g_z/9.8), map angle to z wheel quantized by 32 
  
}

function draw() {
  clear();

    stroke(0);
    strokeWeight(1);
    line(x0,0,x0,height);
    line(0,y0,width,y0);
    line(mouseX,0,mouseX,height);
    line(0,mouseY,width,mouseY);

    strokeWeight(5);
    thetaX = map(mouseX,0,width,-Math.PI,Math.PI);
    thetaY = map(mouseY,0,height,-Math.PI,Math.PI);
    
    thetaX = Math.round(thetaX / (2*Math.PI / 64)) * (2*Math.PI /64);
    thetaY = Math.round(thetaY / (2*Math.PI / 64)) * (2*Math.PI /64);

    stroke("red");
    fill("red");
    line(x0-2*unit,y0,x0 - 2*unit + unit*Math.sin(2*thetaX),y0 + unit*Math.cos(2*thetaX));
    circle(x0-2*unit,y0,unit/10);
    circle(x0-2*unit + unit*Math.sin(2*thetaX),y0 + unit*Math.cos(2*thetaX),unit/10);

    stroke("green");
    fill("green");
    line(x0,y0,x0 + unit*Math.sin(2*thetaY),y0 + unit*Math.cos(2*thetaY));
    circle(x0,y0,unit/10);
    circle(x0 + unit*Math.sin(2*thetaY),y0 + unit*Math.cos(2*thetaY),unit/10);
    
    stroke("blue");
    fill("blue");
    line(x0 + 2*unit,y0,x0 + 2*unit + unit*Math.sin(2*thetaZ),y0 + unit*Math.cos(2*thetaZ));
    circle(x0 + 2*unit,y0,unit/10);
    circle(x0 + 2*unit + unit*Math.sin(2*thetaZ),y0 + unit*Math.cos(2*thetaZ),unit/10);    
}


function mouseWheel(event) {
    if(event.delta > 0){ 
        thetaZ += 2*Math.PI/32;
    }
    else{
        thetaZ -= 2*Math.PI/32;
    }
}

function keyPressed() {

}


function mouseClicked() {

    
}
</script>
</body>
</html>
