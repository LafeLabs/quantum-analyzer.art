<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
     <!--Stop Google:-->
    <META NAME="robots" CONTENT="noindex,nofollow">
     <link href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/9wAA7usAAFVRAAC7uwAA//cAAPrfAAD63wAA+t8AAPjfAAD7jwAA+98AAPvfAAD71wAA++8AAP//AAD//wAA" rel="icon" type="image/x-icon">
     
   <title>Quantum Analyzer</title>    
<script src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <link rel = "stylesheet" href = "instrument.css">    
    <script src = "instrument-sketch.js"></script>
</head>
<body>

<div id="control-panel">
  <h1 class="panel-heading">Quantum Network Analyzer</h1>
  <div id="p5-canvas-container"></div>
  <fieldset class="compact-panel">
    <legend>Analyzer</legend>
    
    <div class="top-grid">
      <label>
        <span>vector network analyzer source power:</span>
        <input type="text" name="vna_source_power" value="-30">
        <span class="unit">dBm</span>
      </label>
    
      <label>
        <span>vector network analyzer IF bandwidth:</span>
        <input type="text" name="vna_if_bandwidth" value="10000">
        <span class="unit">Hz</span>
      </label>
    
      <label>
        <span>spectrum analyzer resolution bandwidth:</span>
        <input type="text" name="sa_resolution_bandwidth" value="1.0">
        <span class="unit">MHz</span>
      </label>
    
      <label>
        <span>spectrum analyzer video bandwidth:</span>
        <input type="text" name="sa_video_bandwidth" value="10.0">
        <span class="unit">kHz</span>
      </label>
    </div>

    <div class="inline-row">
      <label>
        <span>start frequency:</span>
        <input type="text" name="start_frequency" value="4.0">
        <span class="unit">GHz</span>
      </label>

      <label>
        <span>stop frequency:</span>
        <input type="text" name="stop_frequency" value="8.0">
        <span class="unit">GHz</span>
      </label>

      <label>
        <span>number of points:</span>
        <input type="text" name="number_of_points" value="1001">
        <span class="unit"></span> 
      </label>
    </div>
  </fieldset>
  <div class="control-panel twin-columns">
    <fieldset class="compact-panel lower-matrix">
      <legend>Warm Network</legend>
      <label>
        <span>Measurement Instrument Select:</span>
        <select name="output_mode">
          <option value="spectrum_analyzer">Spectrum Analyzer</option>
          <option value="vector_network_analyzer">Vector Network Analyzer</option>
        </select>
      </label>

      <label>
        <span>s matrix element select:</span>
        <select name="s_parameter_select">
          <option value="s11">s11 (input reflection)</option>
          <option value="s21">s21 (forward gain)</option>
          <option value="s12">s12 (reverse gain)</option>
          <option value="s22">s22 (output reflection)</option>
          <option value="s24">s24 (1 port into forward)</option>
          <option value="s14">s14 (1 port into reverse)</option>
          <option value="s13">s13 (output 1 test)</option>
          <option value="s23">s23 (output 2 test)</option>
          <option value="noise_diode">Noise Diode</option>
        </select>
      </label>

      <label class="full-width-field">
        <span>programmable attenuator:</span>
        <input type="text" name="programmable_attenuator" value="-40">
        <span class="unit">dB</span>
      </label>
    </fieldset>
    
    <fieldset class="compact-panel lower-matrix">
      <legend>Cold Network</legend>
    
      <label>
        <span>Cryogenic Output Switch 1:</span>
        <select name="cryogenic_output_switch_1">
          <option value="output">output</option>
          <option value="sntj">sntj</option>
          <option value="jpa">jpa</option>
          <option value="short">short</option>
          <option value="open">open</option>
          <option value="load">load</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
      <label>
        <span>2 Port Device Cryogenic Switch Pair:</span>
        <select name="cryogenic_dut_switch_pair">
          <option value="thru">thru</option>
          <option value="reflect">reflect</option>
          <option value="line">line</option>
          <option value="qubit">qubit</option>
          <option value="twpa">twpa</option>
          <option value="coupler">coupler</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
      <label>
        <span>Cryogenic Output Switch 2:</span>
        <select name="cryogenic_output_switch_2">
          <option value="output">output</option>
          <option value="sntj">sntj</option>
          <option value="jpa">jpa</option>
          <option value="short">short</option>
          <option value="open">open</option>
          <option value="load">load</option>
          <option value="internal_short">internal_short</option>
          <option value="internal_open">internal_open</option>
          <option value="internal_load">internal_load</option>
        </select>
      </label>
    </fieldset>    
  </div>
</div>    
</body>
</html>
